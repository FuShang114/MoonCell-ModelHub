version: '3.8'

services:
  modelhub:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: mooncell-modelhub:latest
    container_name: mooncell-modelhub
    ports:
      - "8080:8080"
    volumes:
      - modelhub-data:/app/data
    environment:
      - SERVER_PORT=8080
      - DATABASE_PATH=/app/data/modelhub.db
      - SERVER_MODE=release
      - QUEUE_CAPACITY=1000
      - RETRY_TIMES=3
      - REQUEST_TIMEOUT=60
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  modelhub-data:
    driver: local