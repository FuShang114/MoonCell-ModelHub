<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonCell Gateway 调试台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fb;
            color: #1f2937;
            line-height: 1.5;
            overflow-x: hidden;
        }


        .app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #111827;
            color: #e5e7eb;
            padding: 20px 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 28px;
        }

        .brand-badge {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav a {
            color: #e5e7eb;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .nav a.active,
        .nav a:hover {
            background: rgba(59, 130, 246, 0.2);
            color: #fff;
        }

        .content {
            flex: 1;
            padding: 24px 28px 36px;
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .title-group h1 {
            font-size: 1.6rem;
            margin-bottom: 4px;
        }

        .title-group p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .btn {
            padding: 0.6rem 1.1rem;
            border: 1px solid transparent;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #1d4ed8;
        }

        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .btn-ghost {
            background: #fff;
            color: #1f2937;
            border: 1px solid #e5e7eb;
        }

        .btn-ghost:hover {
            border-color: #cbd5f5;
            color: #1d4ed8;
        }

        .btn-outline {
            background: #fff;
            color: #2563eb;
            border: 1px solid #c7d2fe;
        }

        .btn-outline:hover {
            border-color: #2563eb;
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .info-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #eef1f7;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            color: #6b7280;
            font-size: 0.85rem;
        }

        .info-item span:last-child {
            color: #111827;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .status-idle {
            background-color: #f3f4f6;
            color: #374151;
        }

        .status-loading {
            background-color: #fef3c7;
            color: #92400e;
        }

        .status-success {
            background-color: #dcfce7;
            color: #166534;
        }

        .status-error {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .panel {
            background: #fff;
            border-radius: 12px;
            padding: 18px;
            border: 1px solid #eef1f7;
        }

        .panel-title {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #374151;
            font-size: 0.9rem;
        }

        .input-field,
        .message-area {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #dbe1f2;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .input-field:focus,
        .message-area:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .input-field:disabled {
            background-color: #f9fafb;
            color: #6b7280;
        }

        .message-area {
            height: 200px;
            resize: vertical;
            font-family: inherit;
        }

        .response-area {
            height: 420px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.88rem;
            line-height: 1.4;
            background-color: #f9fafb;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .btn-toggle.active {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }

        .markdown-output {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #0f172a;
        }

        .markdown-output pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .error-message {
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            display: none;
        }

        .success-message {
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            display: none;
        }

        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #4f46e5;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }


        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .nav {
                flex-direction: row;
                flex-wrap: wrap;
            }
        }

        @media (max-width: 860px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-badge">MC</span>
                MoonCell Gateway
            </div>
            <nav class="nav">
                <a href="/config">监控大盘</a>
                <a href="/admin/instances-ui">实例管理</a>
                <a class="active" href="/admin/debug">调试台</a>
                <a href="/settings">策略设置</a>
            </nav>
        </aside>

        <main class="content">
            <div class="topbar">
                <div class="title-group">
                    <h1>调试测试台</h1>
                    <p>统一聊天接口调试与响应流观测</p>
                </div>
                <div class="controls">
                    <a href="/settings" class="btn btn-ghost">策略设置</a>
                    <a href="/config" class="btn btn-ghost">返回监控</a>
                </div>
            </div>

            <div class="layout-grid">
                <div class="info-card">
                    <div class="info-grid">
                        <div class="info-item">
                            <span>网关地址</span>
                            <span id="gateway-url">-</span>
                        </div>
                        <div class="info-item">
                            <span>当前状态</span>
                            <span id="connection-status">未连接</span>
                        </div>
                        <div class="info-item">
                            <span>测试时间</span>
                            <span id="test-time">-</span>
                        </div>
                        <div class="info-item">
                            <span>请求状态</span>
                            <span class="status-indicator status-idle" id="status-indicator">
                                <span class="spinner" id="status-spinner" style="display: none;"></span>
                                <span id="status-text">准备就绪</span>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="error-message" id="error-message"></div>
                <div class="success-message" id="success-message"></div>

                <div class="grid-2">
                    <div class="panel">
                        <h3 class="panel-title">输入调试信息</h3>

                        <div class="input-group">
                            <label class="input-label">幂等键 (Idempotency Key)</label>
                            <div class="controls">
                                <input type="text" class="input-field" id="idempotency-key" readonly>
                                <button class="btn btn-outline" onclick="generateNewIdempotencyKey()">生成新Key</button>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">调试对话内容</label>
                            <textarea
                                class="message-area"
                                id="message-input"
                                placeholder="请输入您想要测试的对话内容..."
                                maxlength="2000"
                            ></textarea>
                            <div style="margin-top: 0.5rem; text-align: right; font-size: 0.8rem; color: #6b7280;">
                                <span id="char-count">0</span> / 2000 字符
                            </div>
                        </div>

                        <div class="controls">
                            <button class="btn btn-primary" id="send-btn" onclick="sendMessage()">
                                <span id="send-btn-text">发送测试</span>
                            </button>
                            <button class="btn btn-ghost" onclick="clearAll()">清空</button>
                            <button class="btn btn-outline" onclick="loadSampleMessage()">示例消息</button>
                        </div>
                    </div>

                    <div class="panel">
                        <div class="controls" style="justify-content: space-between;">
                            <h3 class="panel-title" style="margin: 0;">API响应流</h3>
                            <div class="controls">
                                <button class="btn btn-ghost btn-toggle active" id="view-text" onclick="setViewMode('text')">正常输出</button>
                                <button class="btn btn-ghost btn-toggle" id="view-raw" onclick="setViewMode('raw')">原始JSON</button>
                            </div>
                        </div>
                        <div class="response-area" id="response-area"></div>

                        <div class="controls" style="margin-top: 1rem;">
                            <button class="btn btn-ghost" onclick="clearResponse()">清空响应</button>
                            <button class="btn btn-outline" onclick="copyResponse()">复制响应</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let isLoading = false;
        let currentAbortController = null;
        let responseTextChunks = [];
        let responseRawChunks = [];
        let viewMode = 'text';

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializePage();
        });

        // 初始化页面
        function initializePage() {
            // 显示网关地址
            document.getElementById('gateway-url').textContent = window.location.origin;
            
            // 生成初始幂等键
            generateNewIdempotencyKey();
            
            // 更新连接状态
            updateConnectionStatus('ready');
            
            // 设置消息输入框事件监听
            document.getElementById('message-input').addEventListener('input', updateCharCount);
            
            // 初始化字符计数
            updateCharCount();
        }

        // 生成新的幂等键
        function generateNewIdempotencyKey() {
            const key = 'debug-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            document.getElementById('idempotency-key').value = key;
        }

        // 更新字符计数
        function updateCharCount() {
            const message = document.getElementById('message-input').value;
            document.getElementById('char-count').textContent = message.length;
        }

        // 发送消息
        async function sendMessage() {
            if (isLoading) return;

            const message = document.getElementById('message-input').value.trim();
            const idempotencyKey = document.getElementById('idempotency-key').value;

            if (!message) {
                showError('请输入要发送的消息内容');
                return;
            }

            // 更新状态
            updateStatus('loading', '正在发送请求...');
            isLoading = true;
            updateSendButton(true);

            // 清空响应区域
            clearResponse();

            // 显示开始时间
            const startTime = new Date();
            document.getElementById('test-time').textContent = startTime.toLocaleString();

            try {
                // 准备请求数据
                const requestData = {
                    message: message,
                    idempotencyKey: idempotencyKey
                };

                // 创建AbortController用于取消请求
                currentAbortController = new AbortController();

                // 发送请求 - 直接调用主要的聊天接口
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestData),
                    signal: currentAbortController.signal
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                // 处理流式响应
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                responseTextChunks = [];
                responseRawChunks = [];
                renderResponse();

                while (true) {
                    const { done, value } = await reader.read();
                    
                    if (done) {
                        break;
                    }

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        const payload = normalizePayload(line);
                        if (!payload || payload === '[DONE]') {
                            continue;
                        }

                        responseRawChunks.push(payload);
                        try {
                            const jsonData = JSON.parse(payload);
                            if (jsonData.content !== undefined) {
                                responseTextChunks.push(jsonData.content || '');
                            } else if (jsonData.text !== undefined) {
                                responseTextChunks.push(jsonData.text || '');
                            } else if (jsonData.delta !== undefined) {
                                responseTextChunks.push(jsonData.delta || '');
                            } else if (jsonData.choices && jsonData.choices[0] && jsonData.choices[0].delta && jsonData.choices[0].delta.content) {
                                responseTextChunks.push(jsonData.choices[0].delta.content);
                            }
                        } catch (e) {
                            // 忽略无法解析的内容
                        }
                        renderResponse();
                    }
                }

                // 计算响应时间
                const endTime = new Date();
                const duration = endTime - startTime;
                responseRawChunks.push(`响应时间: ${duration}ms`);
                responseRawChunks.push(`完成时间: ${endTime.toLocaleString()}`);
                responseTextChunks.push(`\n\n响应时间: ${duration}ms\n完成时间: ${endTime.toLocaleString()}\n`);
                renderResponse();

                updateStatus('success', '请求成功完成');
                showSuccess('AI响应接收完成');

            } catch (error) {
                console.error('发送请求失败:', error);
                
                if (error.name === 'AbortError') {
                    responseTextChunks.push('\n❌ 请求被用户取消\n');
                    responseRawChunks.push('❌ 请求被用户取消');
                    renderResponse();
                    updateStatus('error', '请求已取消');
                } else {
                    responseTextChunks.push(`\n❌ 请求失败: ${error.message}\n`);
                    responseRawChunks.push(`❌ 请求失败: ${error.message}`);
                    renderResponse();
                    updateStatus('error', '请求失败');
                    showError(`请求失败: ${error.message}`);
                }
            } finally {
                isLoading = false;
                updateSendButton(false);
                currentAbortController = null;
            }
        }

        function renderResponse() {
            const responseArea = document.getElementById('response-area');
            if (viewMode === 'raw') {
                responseArea.textContent = responseRawChunks.join('\n');
            } else {
                responseArea.innerHTML = `<div class="markdown-output">${renderMarkdown(responseTextChunks.join(''))}</div>`;
            }
            responseArea.scrollTop = responseArea.scrollHeight;
        }

        // 清空响应
        function clearResponse() {
            responseTextChunks = [];
            responseRawChunks = [];
            renderResponse();
        }

        // 复制响应内容
        async function copyResponse() {
            const responseArea = document.getElementById('response-area');
            const text = responseArea.textContent;
            
            if (text.trim() === '') {
                showError('没有响应内容可复制');
                return;
            }

            try {
                await navigator.clipboard.writeText(text);
                showSuccess('响应内容已复制到剪贴板');
            } catch (error) {
                showError('复制失败: ' + error.message);
            }
        }

        // 清空所有内容
        function clearAll() {
            document.getElementById('message-input').value = '';
            clearResponse();
            generateNewIdempotencyKey();
            updateCharCount();
            updateStatus('idle', '准备就绪');
            hideMessages();
        }

        function setViewMode(mode) {
            viewMode = mode;
            document.getElementById('view-text').classList.toggle('active', mode === 'text');
            document.getElementById('view-raw').classList.toggle('active', mode === 'raw');
            renderResponse();
        }

        function normalizePayload(line) {
            if (!line) return null;
            let trimmed = line.trim();
            if (!trimmed) return null;
            while (trimmed.startsWith('data:')) {
                trimmed = trimmed.slice(5).trim();
            }
            if (trimmed.startsWith('{') && trimmed.endsWith('}')) {
                return trimmed;
            }
            return null;
        }

        function renderMarkdown(text) {
            if (!text) return '';
            const escaped = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            return escaped
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/^### (.*)$/gm, '<h3>$1</h3>')
                .replace(/^## (.*)$/gm, '<h2>$1</h2>')
                .replace(/^# (.*)$/gm, '<h1>$1</h1>')
                .replace(/\n/g, '<br>');
        }

        // 加载示例消息
        function loadSampleMessage() {
            const samples = [
                '你好，请介绍一下人工智能的发展历史。',
                '请解释一下什么是机器学习，并用简单的例子说明。',
                '用Python写一个快速排序算法的实现。',
                '请帮我写一份关于气候变化的研究报告大纲。',
                '解释一下区块链技术的原理和优势。'
            ];
            
            const randomSample = samples[Math.floor(Math.random() * samples.length)];
            document.getElementById('message-input').value = randomSample;
            updateCharCount();
        }

        // 更新状态指示器
        function updateStatus(type, text) {
            const indicator = document.getElementById('status-indicator');
            const spinner = document.getElementById('status-spinner');
            const statusText = document.getElementById('status-text');

            // 移除所有状态类
            indicator.className = 'status-indicator status-' + type;
            
            // 设置文本和旋转器
            statusText.textContent = text;
            spinner.style.display = type === 'loading' ? 'inline-block' : 'none';
        }

        // 更新连接状态
        function updateConnectionStatus(status) {
            const statusElement = document.getElementById('connection-status');
            const statusMap = {
                'ready': '就绪',
                'connecting': '连接中',
                'connected': '已连接',
                'error': '连接错误'
            };
            
            statusElement.textContent = statusMap[status] || '未知状态';
        }

        // 更新发送按钮状态
        function updateSendButton(loading) {
            const button = document.getElementById('send-btn');
            const buttonText = document.getElementById('send-btn-text');
            
            if (loading) {
                button.disabled = true;
                buttonText.innerHTML = '<span class="spinner"></span>发送中...';
            } else {
                button.disabled = false;
                buttonText.textContent = '🚀 发送测试';
            }
        }

        // 显示错误消息
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // 显示成功消息
        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        // 隐藏所有消息
        function hideMessages() {
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(event) {
            // Ctrl+Enter 发送消息
            if (event.ctrlKey && event.key === 'Enter') {
                event.preventDefault();
                if (!isLoading) {
                    sendMessage();
                }
            }
            
            // Escape 取消请求
            if (event.key === 'Escape' && isLoading && currentAbortController) {
                currentAbortController.abort();
            }
        });

        // 页面卸载时取消请求
        window.addEventListener('beforeunload', function() {
            if (currentAbortController) {
                currentAbortController.abort();
            }
        });
    </script>
</body>
</html>
